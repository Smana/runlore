baseURL: https://runlore.io/
title: RunLore
languageCode: en-us
enableRobotsTXT: true
enableGitInfo: true

# Drift guard: any unresolved internal ref (relref/ref) fails the build.
refLinksErrorLevel: ERROR

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: GitHub
      weight: 2
      url: "https://github.com/Smana/runlore"
      params:
        icon: github

params:
  description: "An open-source SRE agent that investigates incidents — and remembers what it learns."
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      link: /
      width: 32
      height: 32
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward
  editURL:
    enable: true
    base: "https://github.com/Smana/runlore/edit/main/website/content"
  footer:
    enable: true
    displayCopyright: true
  theme:
    default: system
    displayToggle: true
