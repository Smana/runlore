# 2+ replicas give failover: every warm replica reports Ready (so the Service may
# round-robin webhooks across all of them), but only the elected leader runs the
# investigation queue — a non-leader replica PROXIES incoming work to the leader
# (single hop, learned from the Lease). `helm upgrade --wait` / Flux kstatus works
# with any replica count. See config.leader_election below.
replicaCount: 2

# Readiness no longer gates on leadership (#264), so the historical rolling-update
# deadlock (new pod not Ready until it leads, old leader holding the Lease) is gone
# and RollingUpdate is viable. Recreate stays the shipped default because it avoids
# two agent VERSIONS overlapping mid-rollout (briefly co-serving webhooks/leases).
# Trade-off: ~20s downtime during the agent's own upgrade; crash-failover HA is
# unaffected. Set RollingUpdate for near-zero-downtime upgrades once you've
# validated it in your environment.
updateStrategy: Recreate

# Deployment (default) shares one PVC across every replica via persistence.existingClaim
# (or the templated `<fullname>-data` claim) — fine for replicaCount=1. On a real
# multi-node cluster with an RWO (single-attach) StorageClass, a second replicaCount>1
# pod scheduled on a different node cannot attach that already-attached volume and
# hangs. Set StatefulSet to give each replica its OWN volume via volumeClaimTemplates;
# leader election (topology-agnostic — only the elected leader investigates) then
# provides real HA. Trade-off: a new leader that takes over on a DIFFERENT replica's
# volume starts with an empty local outcome ledger (the catalog is unaffected — it
# re-clones from git). Only affects persistence.enabled=true; ConfigMap/emptyDir
# catalog modes are unchanged either way.
workloadKind: Deployment  # Deployment | StatefulSet

# StatefulSet-only; ignored under Deployment (which uses updateStrategy above).
# Empty defaults to RollingUpdate in the template — StatefulSet has no "Recreate".
statefulsetUpdateStrategy: ""  # "" (-> RollingUpdate) | RollingUpdate | OnDelete

image:
  repository: ghcr.io/smana/runlore
  tag: ""               # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# RunLore configuration — rendered verbatim into a ConfigMap and mounted at
# /etc/runlore/runlore.yaml. See docs/design.md for the full schema.
config:
  # Source enablement: a key under `sources.<name>` turns that source on; its value
  # is the source's own config. Presence is enablement (e.g. `alertmanager: {}`).
  # The webhook auth token stays server-level (server.webhook_token_env).
  sources:
    alertmanager: {}            # enable the Alertmanager/VMAlert webhook source
    gitops:
      enabled: true             # also react to Flux/Argo CD Ready=False
    # pagerduty:                # enable the PagerDuty V3 incident webhook (POST /webhook/pagerduty)
    #   secret_env: PAGERDUTY_WEBHOOK_SECRET  # env var NAME holding the subscription signing secret
    #                                         # (verifies X-PagerDuty-Signature; required once a model
    #                                         # is configured — fails closed otherwise)
  triggers:
    # Match POLICY for admitted alerts (enablement now lives under sources.alertmanager).
    incidents:
      match:
        severity: [critical]
      # Suppress re-investigation of a still-firing alert within this window. The code
      # default is 0 (disabled) — without it, an alert that keeps firing burns a FULL
      # paid LLM investigation on every Alertmanager repeat_interval. The chart ships
      # 30m to bound cost/noise on a default install; set 0 to restore immediate
      # re-investigation of every still-firing repeat.
      dedup:
        window: 30m
      # Pre-investigation debounce: hold a NON-CRITICAL firing alert this long, then
      # investigate only if it is STILL active — i.e. no matching Alertmanager
      # `resolved` webhook arrived within the window. Skips self-resolving alerts (e.g.
      # a KubeDaemonSetRolloutStuck during a Karpenter node-churn cycle) that would
      # otherwise burn a full investigation on noise and are often already resolved by
      # the time a finding lands. It also keeps such an alert's `resolved` webhook out
      # of the outcome ledger, where it would credit a recalled entry's resolve rate
      # for a resolution the diagnosis had nothing to do with.
      #
      # A `critical` alert is NEVER held — a debounce must never delay the first look at
      # a page (the same invariant the coalescer honours by flushing criticals with no
      # batching wait). Since the match policy above is `severity: [critical]`, this hold
      # is effectively inert on the DEFAULT install; it starts filtering as soon as you
      # widen `match.severity` (e.g. to include `warning`). Self-resolving CRITICALS are
      # filtered by cancel_queued_on_resolve below instead, at zero added latency.
      #
      # Defaults to 60s (same as gitops_failures.debounce). Set `0s` to investigate
      # immediately on every fire. Composes with coalesce (survivors are batched
      # afterwards) and dedup (re-fires are still suppressed before the hold begins).
      debounce: 60s
      # When the Alertmanager `resolved` webhook arrives while the investigation is still
      # QUEUED (accepted, not yet started), drop it. Defaults to true, and it is the only
      # self-resolving filter a CRITICAL alert gets — the debounce above never holds one.
      # It adds NO latency: nothing is waited on, the cancel simply races an investigation
      # that has not begun. Set false to keep the post-hoc "why did it fire?" answer even
      # after an alert self-resolves. An IN-FLIGHT investigation is never cancelled, and a
      # coalesced multi-alert batch is not cancelled on one member's resolve.
      cancel_queued_on_resolve: true
    # Failure POLICY for the gitops source (enablement lives under sources.gitops).
    gitops_failures:
      # Debounce transient Flux failures: wait this long, then re-read the
      # resource's Ready status and investigate only if it is STILL Ready=False.
      # Filters reconcile-churn transients (e.g. a brief HealthCheckCanceled or an
      # ArtifactFailed while a new artifact is mid-checkout) that clear on their own
      # and would otherwise drive confident-but-wrong root causes. Defaults to 60s
      # when omitted; set 0 to fire immediately on every Ready=False.
      debounce: 60s
  # HA: only the elected leader runs the informer + investigation queue. Every warm
  # replica reports Ready (#264); a non-leader replica that receives a webhook
  # proxies it to the leader (looked up via the Lease). Harmless with 1 replica.
  leader_election:
    enabled: true
    name: runlore-leader
  # Cost controls — these ship with SAFE, BOUNDED defaults (not unlimited) so a
  # default install can't run away in LLM spend. Tune for your environment, or set
  # a field to 0 for unlimited (where noted). Coalesce/rate-limit sub-fields left
  # unset default in the agent to 30s debounce, 2m max-wait, 50 batch, 10m cooldown,
  # 1h window.
  investigation:
    # Per-investigation context ceiling (estimated request tokens): when crossed, the
    # agent is nudged to wrap up, then hard-stops and delivers what it has rather than
    # growing context unbounded. 0 = unlimited.
    max_tokens_per_investigation: 100000
    # Cap each tool result fed back to the model (truncates large logs/diffs). 0 = unlimited.
    max_tool_output_bytes: 32768
    # How mid-loop history compaction treats the older tool outputs it elides once the
    # estimate crosses 0.7x max_tokens_per_investigation. "elide" (default) drops their
    # bodies for short markers (lossy). "summarize" first asks a model for ONE compact
    # factual digest of the elided batch per compaction event (routed to model.verify when
    # set, else the main model) and keeps that in place of the markers; any summarizer
    # error/refusal/truncation falls back to plain elision. Needs a token budget above.
    # compaction: elide
    # Interim progress delivery for long investigations (off by default). When enabled,
    # deliver a ping (title, step count, tools used, latest interim text — redacted +
    # escaped) every every_steps steps to notifiers that support it (Slack today).
    # progress_updates:
    #   enabled: true
    #   every_steps: 5           # must be > 0 when enabled
    # App-layer allowlist of namespaces the pod_logs / controller_logs tools may read
    # RAW pod logs from, BEYOND the incident's own namespace (the incident namespace is
    # always allowed at the app layer — RBAC still gates the actual read). Pod logs carry
    # secrets/PII and are streamed to the external LLM, so the model is constrained here,
    # not by Kubernetes RBAC alone. This MUST be a superset of where pods/log RBAC is
    # granted (rbac.controllerLogNamespaces) or pod_logs is blocked at the app layer for
    # those namespaces. LEAVE UNSET (commented) and the chart auto-defaults it to
    # rbac.controllerLogNamespaces so the two stay in sync automatically — set it
    # explicitly ONLY to widen/narrow beyond the RBAC scope.
    # pod_log_namespaces: [flux-system]
    coalesce:
      enabled: true             # fold a correlated alert storm into ONE investigation
      # debounce: 30s           # flush batch quiet for this long
      # max_wait: 2m            # force flush even if still receiving alerts
      # max_batch: 50           # flush when batch reaches this size
      # cooldown: 10m           # suppress re-alerts for a group after a flush (a new critical
      #                         #   alertname or a standing 👎 on the trigger bypasses suppression)
      # correlation_labels: []  # group by label values instead of AM groupKey
    rate_limit:
      max_per_window: 20        # cap investigations per window (window defaults to 1h);
                                #   explicit 0 = unlimited; UNSET now defaults to 30
      # window: 1h
      # max_requeues: 3
    # recurrence_cooldown: 30m  # OPT-IN: skip re-investigating a trigger answered conclusively less
    #                           #   than this long ago (a still-firing alert otherwise re-investigates
    #                           #   every repeat_interval; a failing GitOps resource every ~10m resync).
    #                           #   An inconclusive prior always retries; a 👎 re-arms immediately.
    #                           #   Requires outcome.ledger_path.
  # Structured logging. In-cluster defaults to JSON so logs are ingestible by
  # Loki / VictoriaLogs / CloudWatch; switch format to "text" for human-readable
  # output. level: debug | info | warn | error. Both are overridable at runtime via
  # the RUNLORE_LOG_FORMAT / RUNLORE_LOG_LEVEL env vars.
  logging:
    format: json
    level: info
  # OpenTelemetry self-instrumentation (Prometheus-format /metrics endpoint).
  # Enable when a VMServiceScrape (or ServiceMonitor) will scrape this agent.
  # A portable Grafana dashboard + PrometheusRule/VMRule alerts live under
  # deploy/observability/ (see docs/observability.md).
  telemetry:
    metrics_enabled: false
  # Phase-2 backlog groomer (lore curate). `stale_after` drives the lifecycle sweep;
  # the Queue (promote solved→ready-to-merge on resolution) and Recurrence
  # (open a knowledge-gap issue for repeatedly-unresolved patterns) passes also run
  # when config.outcome.ledger_path is set (they read the outcome ledger).
  curate:
    stale_after: 720h          # close unprotected KB PRs idle longer than this; 0 disables
    recurrence_threshold: 3    # open a knowledge-gap issue after this many unresolved occurrences; 0 ⇒ 3.
                               # Also the trigger for escalating a closed-unmerged (human-rejected) KB
                               # entry that keeps recurring: RunLore links the closed PR in a knowledge-gap
                               # issue rather than reopening it.
  # model:
  #   base_url: https://vllm.svc/v1
  #   model: <model-name>
  #   api_key_env: OPENAI_API_KEY
  #   # Opt-in reasoning depth: anthropic low|medium|high|max, openai-compatible
  #   # minimal|low|medium|high; unsupported for gemini; empty = omitted (default).
  #   # A model that doesn't support the knob returns a 400, classified permanent.
  #   effort: high
  #   # Opt into Anthropic adaptive extended thinking (anthropic-only; "adaptive" is the
  #   # only value; rejected for other providers; empty = off). Give max_tokens headroom.
  #   thinking: adaptive
  #   # Per-investigation cost estimate (USD per million tokens; all >= 0). When set, the
  #   # delivered finding gains a cost footer and the investigation_cost_usd metric is
  #   # populated. Omit for token counts only. verify.pricing inherits these when unset.
  #   pricing:
  #     input_usd_per_mtok: 3.0
  #     output_usd_per_mtok: 15.0
  #     cached_input_usd_per_mtok: 0.3
  #   # Route the adversarial verify pass to a cheaper/faster model to cut the
  #   # +1-call-per-investigation cost (inherits the fields above unless overridden;
  #   # omit to verify with the main model). Verify always runs — this only lowers cost.
  #   verify:
  #     model: <cheaper-model-name>
  #   # Embeddings endpoint (OpenAI-compatible /embeddings) for hybrid recall — see
  #   # catalog.instant_recall.hybrid. Unset ⇒ BM25-only recall.
  #   embeddings:
  #     base_url: https://vllm.svc/v1
  #     model: <embedding-model-name>
  #     api_key_env: OPENAI_API_KEY
  # catalog:
  #   dir: /var/lib/runlore/catalog
  #   instant_recall:
  #     enabled: true
  #     min_score: 1.0                 # similarity floor for the top hit (shipped default)
  #     margin_gap: 1.0                # top hit must beat the runner-up by this (corpus-portable; not an absolute floor)
  #     solo_floor: 4.0                # confident bar when there is only one hit
  #     require_workload_match: false  # true = exact namespace+workload; false = namespace-level agreement is enough
  #     # LLM reranker (ON by default when instant_recall is enabled): replaces the
  #     # (solo_floor/margin_gap) with a CALIBRATED, corpus-independent match-confidence
  #     # gate. One cheap call ranks the top-K structurally-agreeing candidates; fires only
  #     # when the reranker's 0-1 confidence clears rerank_threshold. Routes to model.verify
  #     # (cheaper/faster) when configured. Default off ⇒ the magnitude gate is unchanged.
  #     # rerank: false                # DEFAULT is on; set false to fall back to the legacy BM25-magnitude gate
  #     rerank_threshold: 0.7          # calibrated match-confidence bar to short-circuit (probability; no per-corpus tuning)
  #     rerank_k: 5                    # candidates ranked in the one call (bounded for cost)
  #     rerank_min_score: 0.1          # trivial retrieval-score floor; below it the paid call is skipped (cost guard)
  #     # EXPERIMENTAL hybrid recall: fuse BM25 + embeddings, gate on cosine similarity.
  #     # Requires model.embeddings (above). TUNE the cosine thresholds against the
  #     # instant-recall eval before relying on it — defaults are conservative placeholders.
  #     hybrid: false
  #     hybrid_min_score: 0.80         # cosine floor for the top hit
  #     hybrid_margin_gap: 0.05        # cosine margin over the runner-up
  # outcome:
  #   ledger_path: /var/lib/runlore/catalog/outcomes.jsonl  # learning-loop outcome ledger.
  #     Keep it UNDER catalog.mountPath and set persistence.enabled=true: the serve
  #     Deployment writes it and the curate CronJob reads it, so both must mount the
  #     SAME persistent volume. With persistence disabled they get separate ephemeral
  #     volumes and `lore curate`'s Queue + Recurrence passes read an empty ledger
  #     (the command warns loudly at startup when the ledger it sees is absent/empty).
  # notify:
  #   slack:
  #     # Option A — incoming webhook (simplest):
  #     webhook_url_env: SLACK_WEBHOOK_URL
  #     # Option B — bot token (chat.postMessage; reuse an existing Slack app, e.g. Alertmanager's):
  #     # bot_token_env: SLACK_BOT_TOKEN
  #     # channel: "#alerts"            # channel ID or name (required with bot_token_env)
  #     # signing_secret_env: SLACK_SIGNING_SECRET  # only needed for rung-2 approve/reject buttons
  #     # feedback_buttons: true        # OPT-IN 👍/👎 rating buttons feeding the learning loop.
  #     #   Requires Slack to reach POST /slack/interactions (Interactivity Request URL through
  #     #   your ingress — same exposure as approve/reject buttons), plus signing_secret_env
  #     #   and outcome.ledger_path. Startup fails loud if either is missing.
  #   matrix: { homeserver: https://matrix.org, room_id: "!r:hs", access_token_env: MATRIX_TOKEN }
  #   # matrix.feedback_reactions: true  # OPT-IN 👍/👎 reactions feeding the learning loop.
  #   #   ZERO-INGRESS (outbound /sync long-poll — nothing to expose, unlike Slack buttons).
  #   #   Requires outcome.ledger_path; use an invite-only room (any member can vote).
  #   webhook:
  #     url_env: RUNLORE_WEBHOOK_NOTIFY_URL   # POST findings JSON to this URL
  # forge:
  #   kb_repo: owner/name
  #   base_branch: main
  #   github_app: { app_id: 0, installation_id: 0, private_key_env: GITHUB_APP_PRIVATE_KEY }
  # Investigate signals (optional). metrics/logs enable query_metrics/query_logs.
  # metrics: { url: http://vmsingle.observability.svc:8429 }   # PromQL (VictoriaMetrics/Prometheus)
  # Logs backend (query_logs / logs_error_summary / discover_log_fields). The provider is
  # auto-detected (Loki answers /loki/api/v1/status/buildinfo; anything else = VictoriaLogs);
  # pin it with `provider:` if the backend is unreachable at chart-install time.
  # logs:    { url: http://victorialogs.observability.svc:9428 }                # VictoriaLogs (LogsQL)
  # logs:    { url: http://loki-gateway.observability.svc:80, provider: loki }  # Grafana Loki (LogQL)
  # Network-flow signal (network_drops). PLUGGABLE + CNI-agnostic — no CNI assumed,
  # none default-on. Choose ONE provider (see docs/data-sources.md):
  # network:
  #   provider: hubble                       # Cilium Hubble (requires the Cilium CNI)
  #   hubble: { url: hubble-relay.kube-system:80 }
  #   # provider: aws-vpc-flow-logs          # any AWS VPC (incl. EKS + AWS VPC CNI)
  #   # aws: { region: eu-west-3, log_group: /aws/vpc/flowlogs }
  #   # provider: gcp-firewall-logs          # any GCP VPC (incl. GKE)
  #   # gcp: { project: my-gcp-project }

# Secret-backed env vars (model API key, Slack webhook, Matrix token, GitHub key).
# Reference an existing Secret — RunLore never inlines credentials.
envFrom: []
#   - secretRef:
#       name: runlore-secrets
env: []
#   - name: OPENAI_API_KEY
#     valueFrom:
#       secretKeyRef: { name: runlore-secrets, key: openai-api-key }

# Mount an OKF knowledge catalog (e.g. a ConfigMap of runbooks) so kb_search works.
# Set config.catalog.dir to mountPath to enable it.
catalog:
  configMap: ""                       # ConfigMap of OKF .md files (static mode)
  gitSync: false                      # writable mirror for config.catalog.git (closes the read/write loop)
  mountPath: /var/lib/runlore/catalog

# Durability for the writable data path (catalog.mountPath) where the outcome
# ledger and the hash-chained audit log live. Disabled by default: the data path
# is an emptyDir and is DESTROYED on pod restart, upgrade, or leader failover.
# Enable to back it with a volume so the outcome ledger + audit log survive pod
# restarts. Two HA shapes, picked via workloadKind above:
#   - workloadKind: Deployment (default) + accessModes: [ReadWriteMany] (e.g. EFS) —
#     every replica shares the SAME volume, so a new leader keeps the ledger/audit
#     log with zero data loss on failover. Requires an RWX-capable StorageClass.
#   - workloadKind: StatefulSet + accessModes: [ReadWriteOnce] (e.g. EBS) — each
#     replica gets its OWN volume via volumeClaimTemplates; no RWX needed, but a
#     new leader taking over on a different replica starts with an empty ledger.
# Leave disabled (emptyDir) for non-HA / ephemeral setups.
persistence:
  enabled: false
  storageClass: ""
  accessModes: ["ReadWriteMany"]
  size: 1Gi
  existingClaim: ""                   # reuse a pre-provisioned PVC instead of templating one

# Keeps at least one replica available during voluntary disruptions (only applied
# when replicaCount > 1).
podDisruptionBudget:
  create: true
  minAvailable: 1

service:
  type: ClusterIP
  port: 8080                          # the /webhook/alertmanager + /healthz + /metrics port

# Health probes. The agent has a non-trivial warm-up: the HTTP server (and so
# /healthz) comes up within ~1s, but /readyz stays 503 until — for a git-sync
# catalog — the first clone+index completes (a real KB repo can take many
# seconds). Readiness does NOT depend on leadership (#264): every replica whose
# catalog is warm reports Ready, leader and standby alike, so `helm upgrade
# --wait` / Flux kstatus succeeds with replicaCount>1. A non-leader replica that
# receives a webhook proxies it to the leader.
#
# A startupProbe on /healthz owns the cold-start window: while it runs, the
# liveness + readiness probes are suppressed, so warm-up never emits premature
# "Unhealthy" readiness events. Once it passes once, the readiness probe takes
# over and liveness guards against a genuine process hang on its normal cadence.
# The startupProbe targets /healthz, NOT /readyz: a slow first catalog sync must
# delay readiness, never get the pod killed. Liveness is deliberately NOT
# loosened — it still trips a real hang.
probes:
  startup:
    enabled: true            # set false to skip the startupProbe (e.g. very fast static catalog)
    periodSeconds: 2
    failureThreshold: 30     # warm-up budget = periodSeconds * failureThreshold = 60s
    timeoutSeconds: 2
  liveness:
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 2
  readiness:
    periodSeconds: 5         # keep tight so a cold/broken catalog surfaces in endpoints fast
    failureThreshold: 3
    timeoutSeconds: 2

serviceAccount:
  create: true
  name: ""
  annotations: {}

# ClusterRole granting the React/what-changed reads: watch Flux Kustomizations,
# read GitRepositories. Cluster-scoped because the informer watches all namespaces.
rbac:
  create: true
  # allowActions grants patch on Flux resources for rung-2 execution
  # (config.actions.mode: approve). Off by default — read-only without it.
  allowActions: false
  # Namespaces where the agent may patch Flux resources (suspend/resume/reconcile).
  # Granted as namespace-scoped Roles ONLY here — never cluster-wide — so the blast
  # radius is bounded. Mirror config.actions.allow.namespaces. Empty = no patch
  # rights at all (actions fail closed at the RBAC layer even if mode is enabled).
  actionNamespaces: []
  # Namespaces where the agent may read RAW pod logs (pods/log) for the controller_logs
  # tool. Granted as namespace-scoped Roles ONLY — never cluster-wide — because pod logs
  # routinely contain secrets/tokens/PII and tool output is sent to an external LLM.
  # The controller_logs tool only ever reads the Flux controllers (source/kustomize/
  # helm/notification), which live in flux-system by convention, so the default is the
  # single flux-system namespace. Override ONLY if you relocate the Flux controllers.
  # For ArgoCD deployments (config.gitops.engine: argocd), override to [argocd] instead.
  # Cluster-wide `pods` get/list (pod STATUS, not log bodies) stays in the ClusterRole
  # because pod_status/kube_events triage arbitrary incident namespaces. Redacting
  # secrets that still surface via status/event messages and these log bodies is a
  # separate follow-up (see roadmap R19).
  #
  # PAIRING: this list is the RBAC scope (where pods/log is granted). The app-layer
  # allowlist that gates which namespaces the pod_logs tool may actually read
  # (config.investigation.pod_log_namespaces) auto-tracks this value unless overridden,
  # so the two never drift. If you set config.investigation.pod_log_namespaces
  # explicitly, keep it a superset of this list or pod_logs is blocked at the app layer.
  controllerLogNamespaces:
    - flux-system
  # skipMissingControllerLogNamespaces: skip the per-namespace controller_logs
  # Role/RoleBinding for any controllerLogNamespaces entry that does not exist at
  # install time, instead of failing the whole release with `namespaces "<ns>" not
  # found`. Default true so a bare `helm install` — or one that runs before Flux/
  # Argo CD is installed — succeeds; the RBAC is created the moment the namespace
  # (and thus the GitOps controllers whose logs it grants) exists, via `helm upgrade`.
  # Relies on Helm's `lookup`, which has cluster access during a real install/upgrade
  # (including Flux's helm-controller) but NOT during client-side rendering
  # (`helm template`, Argo CD's diff) — there every namespace reads as missing and the
  # Role is skipped. If you render client-side (e.g. deploy via Argo CD) and guarantee
  # the namespace exists, set this false to keep the RBAC deterministic.
  skipMissingControllerLogNamespaces: true

# Default-deny NetworkPolicy: restrict ingress to the webhook/health port and egress
# to DNS + HTTPS + the Kubernetes API. Tighten egress to your model/git/observability
# CIDRs in production. Disable if you manage network policy out of band.
networkPolicy:
  enabled: true
  # Strict egress. false (default): the agent may egress to ANY destination on 443/6443
  # (the Kubernetes API plus your model / git-forge / observability endpoints) — it works
  # out of the box. true: DENY egress by default and allow ONLY the destinations declared
  # under `egress` below — you MUST then list your model/forge/observability endpoints, or
  # the agent cannot reach them. DNS is scoped to the cluster DNS service in BOTH modes.
  strict: false
  egress:
    # DNS egress is scoped to the cluster DNS service by default — a safe, free hardening
    # applied in both modes. If your DNS pods use different labels, override the selectors;
    # set toClusterDNS: false to allow port 53 to any destination.
    dns:
      toClusterDNS: true
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    # The lists below are consulted ONLY under strict: true — declare where the agent may
    # reach out so the empty-by-default deny still lets real traffic through.
    allowedCIDRs: []        # off-cluster endpoints on 443 (model API, git forge, observability), e.g. ["203.0.113.10/32"]
    namespaceSelectors: []  # in-cluster backends on 443, e.g. [{ matchLabels: { kubernetes.io/metadata.name: monitoring } }]
    apiServerCIDRs: []      # the Kubernetes API server endpoint(s) on 6443, e.g. ["10.0.0.1/32"]
  extraEgress: []   # appended verbatim in BOTH modes — the escape hatch for anything custom
  # Scope ingress to the webhook port. Empty (default) leaves it permissive
  # (no `from:` ⇒ all sources allowed) so installs don't break on upgrade.
  #
  # RISK: with the default empty list, ANY pod in the cluster can reach the webhook
  # port — and the webhook itself is UNAUTHENTICATED unless you also set
  # server.webhook_token_env. Combined, that means any workload on the cluster (a
  # compromised or merely misconfigured neighbor) can POST synthetic alerts and
  # trigger paid LLM investigations at will, burning your model spend. Set
  # ingressFrom to restrict callers to your Alertmanager namespace, AND set
  # server.webhook_token_env — see docs/security-model.md.
  #
  # Example — only the monitoring namespace may POST alerts:
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: monitoring
  ingressFrom: []
  # Render a CiliumNetworkPolicy allowing egress to the EKS Pod Identity credential
  # endpoint (host entity, 169.254.170.23:80). Required for the AWS cloud provider
  # on Cilium clusters — a plain NetworkPolicy can't match the host-network target.
  awsPodIdentity: false

# VictoriaMetrics VMServiceScrape: creates a scrape target for the /metrics endpoint.
# Requires the VictoriaMetrics Operator CRD to be installed in the cluster.
# Enable together with config.telemetry.metrics_enabled.
vmServiceScrape:
  enabled: false
  interval: 30s     # scrape interval
  path: /metrics    # metrics endpoint path (served on service.port)

# The agent runs cluster-wide informers (Kustomizations/HelmReleases), a bleve
# catalog index, a git-sync mirror, and multi-tool LLM investigations. A thorough
# run (a "pro" model over up to maxSteps=20, each call re-sending the growing
# message history plus tool outputs) is the memory peak — 768Mi OOMKilled such a
# run, so the limit is 1.5Gi. Idle is ~15-30Mi; CPU stays modest.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1536Mi

# Restricted PSS-compliant defaults.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# Phase-2 backlog groomer (lore curate) as a scheduled Job. Opt-in: writes to the
# KB forge (closes duplicate/stale PRs), so it stays disabled until you set the
# GitHub App credentials and enable it.
curate:
  cronjob:
    enabled: false
    schedule: "0 * * * *"   # hourly
