# 2+ replicas give failover: only the elected leader is Ready/active; the rest are
# hot standby. See config.leader_election below.
replicaCount: 2

# Recreate avoids a rolling-update deadlock under leader election: a new pod can't
# become Ready until it leads, but the old leader holds the Lease (and maxUnavailable
# is 0), so an in-place rolling update stalls. Recreate terminates old pods first.
# Trade-off: ~20s downtime during the agent's own upgrade; crash-failover HA is
# unaffected. Switch to RollingUpdate only with a leadership-independent readiness model.
updateStrategy: Recreate

image:
  repository: ghcr.io/smana/runlore
  tag: ""               # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# RunLore configuration — rendered verbatim into a ConfigMap and mounted at
# /etc/runlore/runlore.yaml. See docs/design.md for the full schema.
config:
  triggers:
    incidents:
      enabled: true
      match:
        severity: [critical]
      dedup:
        window: 30m
    gitops_failures:
      enabled: true
      # Debounce transient Flux failures: wait this long, then re-read the
      # resource's Ready status and investigate only if it is STILL Ready=False.
      # Filters reconcile-churn transients (e.g. a brief HealthCheckCanceled or an
      # ArtifactFailed while a new artifact is mid-checkout) that clear on their own
      # and would otherwise drive confident-but-wrong root causes. Defaults to 60s
      # when omitted; set 0 to fire immediately on every Ready=False.
      debounce: 60s
  # HA: only the elected leader runs the informer + investigation queue and reports
  # ready (the Service then routes webhooks to the leader). Harmless with 1 replica.
  leader_election:
    enabled: true
    name: runlore-leader
  # Storm cost-control: fold correlated alerts into one investigation and cap the
  # per-window investigation budget. Defaults (30s debounce, 2m max-wait, 50 batch,
  # 10m cooldown, 1h window) are applied by the agent when fields are omitted.
  investigation:
    coalesce:
      enabled: false
      # debounce: 30s           # flush batch quiet for this long
      # max_wait: 2m            # force flush even if still receiving alerts
      # max_batch: 50           # flush when batch reaches this size
      # cooldown: 10m           # suppress re-alerts for a group after a flush
      # correlation_labels: []  # group by label values instead of AM groupKey
    rate_limit:
      max_per_window: 0        # 0 = unlimited; set e.g. 20 to cap investigations/hour
      # window: 1h
      # max_requeues: 3
  # Structured logging. In-cluster defaults to JSON so logs are ingestible by
  # Loki / VictoriaLogs / CloudWatch; switch format to "text" for human-readable
  # output. level: debug | info | warn | error. Both are overridable at runtime via
  # the RUNLORE_LOG_FORMAT / RUNLORE_LOG_LEVEL env vars.
  logging:
    format: json
    level: info
  # OpenTelemetry self-instrumentation (Prometheus-format /metrics endpoint).
  # Enable when a VMServiceScrape (or ServiceMonitor) will scrape this agent.
  # A portable Grafana dashboard + PrometheusRule/VMRule alerts live under
  # deploy/observability/ (see docs/observability.md).
  telemetry:
    metrics_enabled: false
  # Phase-2 backlog groomer (lore curate). `stale_after` drives the lifecycle sweep;
  # the Queue (promote solved→ready-to-merge on resolution) and Recurrence
  # (open a knowledge-gap issue for repeatedly-unresolved patterns) passes also run
  # when config.outcome.ledger_path is set (they read the outcome ledger).
  curate:
    stale_after: 720h          # close unprotected KB PRs idle longer than this; 0 disables
    recurrence_threshold: 3    # open a knowledge-gap issue after this many unresolved occurrences; 0 ⇒ 3
  # model:
  #   base_url: https://vllm.svc/v1
  #   model: <model-name>
  #   api_key_env: OPENAI_API_KEY
  # catalog:
  #   dir: /var/lib/runlore/catalog
  #   instant_recall:
  #     enabled: true
  #     min_score: 1.5                 # similarity floor for the top hit
  #     margin_gap: 1.0                # top hit must beat the runner-up by this (corpus-portable; not an absolute floor)
  #     solo_floor: 4.0                # confident bar when there is only one hit
  #     require_workload_match: false  # true = exact namespace+workload; false = namespace-level agreement is enough
  # outcome:
  #   ledger_path: /var/lib/runlore/catalog/outcomes.jsonl  # learning-loop outcome ledger; for durability set persistence.enabled and point this at the persistent mount (catalog.mountPath)
  # notify:
  #   slack: { webhook_url_env: SLACK_WEBHOOK_URL }
  #   matrix: { homeserver: https://matrix.org, room_id: "!r:hs", access_token_env: MATRIX_TOKEN }
  # forge:
  #   kb_repo: owner/name
  #   base_branch: main
  #   github_app: { app_id: 0, installation_id: 0, private_key_env: GITHUB_APP_PRIVATE_KEY }
  # Investigate signals (optional). metrics/logs enable query_metrics/query_logs.
  # metrics: { url: http://vmsingle.observability.svc:8429 }   # PromQL (VictoriaMetrics/Prometheus)
  # logs:    { url: http://victorialogs.observability.svc:9428 }  # LogsQL (VictoriaLogs)
  # Network-flow signal (network_drops). PLUGGABLE + CNI-agnostic — no CNI assumed,
  # none default-on. Choose ONE provider (see docs/data-sources.md):
  # network:
  #   provider: hubble                       # Cilium Hubble (requires the Cilium CNI)
  #   hubble: { url: hubble-relay.kube-system:80 }
  #   # provider: aws-vpc-flow-logs          # any AWS VPC (incl. EKS + AWS VPC CNI)
  #   # aws: { region: eu-west-3, log_group: /aws/vpc/flowlogs }
  #   # provider: gcp-firewall-logs          # any GCP VPC (incl. GKE)
  #   # gcp: { project: my-gcp-project }

# Secret-backed env vars (model API key, Slack webhook, Matrix token, GitHub key).
# Reference an existing Secret — RunLore never inlines credentials.
envFrom: []
#   - secretRef:
#       name: runlore-secrets
env: []
#   - name: OPENAI_API_KEY
#     valueFrom:
#       secretKeyRef: { name: runlore-secrets, key: openai-api-key }

# Mount an OKF knowledge catalog (e.g. a ConfigMap of runbooks) so kb_search works.
# Set config.catalog.dir to mountPath to enable it.
catalog:
  configMap: ""                       # ConfigMap of OKF .md files (static mode)
  gitSync: false                      # writable mirror for config.catalog.git (closes the read/write loop)
  mountPath: /var/lib/runlore/catalog

# Durability for the writable data path (catalog.mountPath) where the outcome
# ledger and the hash-chained audit log live. Disabled by default: the data path
# is an emptyDir and is DESTROYED on pod restart, upgrade, or leader failover.
# Enable to back it with a ReadWriteMany volume (e.g. EFS/Filestore) so the
# outcome ledger + audit log survive pod restarts AND leader failover. RWX is
# required because the standby replica must mount the same data to take over.
# Leave disabled (emptyDir) for non-HA / ephemeral setups.
persistence:
  enabled: false
  storageClass: ""
  accessModes: ["ReadWriteMany"]
  size: 1Gi
  existingClaim: ""                   # reuse a pre-provisioned PVC instead of templating one

# Keeps at least one replica available during voluntary disruptions (only applied
# when replicaCount > 1).
podDisruptionBudget:
  create: true
  minAvailable: 1

service:
  type: ClusterIP
  port: 8080                          # the /webhook/alertmanager + /healthz + /metrics port

serviceAccount:
  create: true
  name: ""
  annotations: {}

# ClusterRole granting the React/what-changed reads: watch Flux Kustomizations,
# read GitRepositories. Cluster-scoped because the informer watches all namespaces.
rbac:
  create: true
  # allowActions grants patch on Flux resources for rung-2 execution
  # (config.actions.mode: approve). Off by default — read-only without it.
  allowActions: false
  # Namespaces where the agent may patch Flux resources (suspend/resume/reconcile).
  # Granted as namespace-scoped Roles ONLY here — never cluster-wide — so the blast
  # radius is bounded. Mirror config.actions.allow.namespaces. Empty = no patch
  # rights at all (actions fail closed at the RBAC layer even if mode is enabled).
  actionNamespaces: []

# Default-deny NetworkPolicy: restrict ingress to the webhook/health port and egress
# to DNS + HTTPS + the Kubernetes API. Tighten egress to your model/git/observability
# CIDRs in production. Disable if you manage network policy out of band.
networkPolicy:
  enabled: true
  # Strict egress. false (default): the agent may egress to ANY destination on 443/6443
  # (the Kubernetes API plus your model / git-forge / observability endpoints) — it works
  # out of the box. true: DENY egress by default and allow ONLY the destinations declared
  # under `egress` below — you MUST then list your model/forge/observability endpoints, or
  # the agent cannot reach them. DNS is scoped to the cluster DNS service in BOTH modes.
  strict: false
  egress:
    # DNS egress is scoped to the cluster DNS service by default — a safe, free hardening
    # applied in both modes. If your DNS pods use different labels, override the selectors;
    # set toClusterDNS: false to allow port 53 to any destination.
    dns:
      toClusterDNS: true
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    # The lists below are consulted ONLY under strict: true — declare where the agent may
    # reach out so the empty-by-default deny still lets real traffic through.
    allowedCIDRs: []        # off-cluster endpoints on 443 (model API, git forge, observability), e.g. ["203.0.113.10/32"]
    namespaceSelectors: []  # in-cluster backends on 443, e.g. [{ matchLabels: { kubernetes.io/metadata.name: monitoring } }]
    apiServerCIDRs: []      # the Kubernetes API server endpoint(s) on 6443, e.g. ["10.0.0.1/32"]
  extraEgress: []   # appended verbatim in BOTH modes — the escape hatch for anything custom
  # Render a CiliumNetworkPolicy allowing egress to the EKS Pod Identity credential
  # endpoint (host entity, 169.254.170.23:80). Required for the AWS cloud provider
  # on Cilium clusters — a plain NetworkPolicy can't match the host-network target.
  awsPodIdentity: false

# VictoriaMetrics VMServiceScrape: creates a scrape target for the /metrics endpoint.
# Requires the VictoriaMetrics Operator CRD to be installed in the cluster.
# Enable together with config.telemetry.metrics_enabled.
vmServiceScrape:
  enabled: false
  interval: 30s     # scrape interval
  path: /metrics    # metrics endpoint path (served on service.port)

# The agent runs cluster-wide informers (Kustomizations/HelmReleases), a bleve
# catalog index, a git-sync mirror, and multi-tool LLM investigations. A thorough
# run (a "pro" model over up to maxSteps=20, each call re-sending the growing
# message history plus tool outputs) is the memory peak — 768Mi OOMKilled such a
# run, so the limit is 1.5Gi. Idle is ~15-30Mi; CPU stays modest.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1536Mi

# Restricted PSS-compliant defaults.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# Phase-2 backlog groomer (lore curate) as a scheduled Job. Opt-in: writes to the
# KB forge (closes duplicate/stale PRs), so it stays disabled until you set the
# GitHub App credentials and enable it.
curate:
  cronjob:
    enabled: false
    schedule: "0 * * * *"   # hourly
