{{- if .Values.networkPolicy.enabled -}}
# Network posture for the agent. Ingress: only the webhook/health port is reachable. Egress:
# DNS is scoped to the cluster DNS service, and HTTPS + the Kubernetes API are allowed to any
# destination by default. Set networkPolicy.strict=true to deny egress by default and allow only
# the destinations declared in networkPolicy.egress (model/forge/observability CIDRs, in-cluster
# namespaceSelectors, and the API server); networkPolicy.extraEgress is appended in either mode.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "runlore.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
      {{- with .Values.networkPolicy.ingressFrom }}
      # Scope who may reach the webhook port (e.g. the Alertmanager namespace).
      # Empty (default) ⇒ no `from:` ⇒ all sources allowed (permissive, no break).
      from:
        # Replica-to-replica forwarding (#264): a non-leader replica proxies
        # work-bearing requests to the leader pod on this same port, so peer
        # pods of this release must stay reachable however ingressFrom narrows
        # the external sources.
        - podSelector:
            matchLabels:
              {{- include "runlore.selectorLabels" $ | nindent 14 }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # Replica-to-replica forwarding (#264): a non-leader replica proxies
    # work-bearing requests to the leader pod on the serve port. Allowed in BOTH
    # egress modes — the permissive default only opens 443/6443 and strict mode
    # denies by default, so without this rule forwarding would be silently
    # dropped by the CNI.
    - to:
        - podSelector:
            matchLabels:
              {{- include "runlore.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    # DNS — scoped to the cluster DNS service by default (override/disable via networkPolicy.egress.dns).
    {{- if .Values.networkPolicy.egress.dns.toClusterDNS }}
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.egress.dns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.egress.dns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- else }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if .Values.networkPolicy.strict }}
    # strict: deny egress by default — allow only the declared destinations.
    {{- range .Values.networkPolicy.egress.allowedCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range .Values.networkPolicy.egress.namespaceSelectors }}
    - to:
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range .Values.networkPolicy.egress.apiServerCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 6443
    {{- end }}
    {{- else }}
    # permissive default: HTTPS (model/git/observability) + the Kubernetes API to any destination.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- if .Values.networkPolicy.awsPodIdentity }}
---
# On Cilium clusters using EKS Pod Identity, the credential endpoint runs on the
# node host network (link-local 169.254.170.23:80). Cilium classifies it as the
# "host" entity, which a Kubernetes NetworkPolicy ipBlock cannot match — so the AWS
# SDK's credential fetch is silently dropped and the cloud provider hangs. This
# CiliumNetworkPolicy is the supported way to allow it. Enable when cloud.provider
# is aws AND the cluster runs Cilium.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "runlore.fullname" . }}-aws-pod-identity
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "runlore.selectorLabels" . | nindent 6 }}
  egress:
    - toEntities: [host]
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
{{- end }}
{{- end }}
