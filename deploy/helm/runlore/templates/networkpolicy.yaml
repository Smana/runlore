{{- if .Values.networkPolicy.enabled -}}
# Default-deny ingress/egress for the agent: only the webhook/health port is reachable,
# and egress is limited to DNS, HTTPS (model/git/observability) and the Kubernetes API.
# Tighten egress to specific CIDRs via networkPolicy.extraEgress in production.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "runlore.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # DNS resolution.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API + model/git/observability over HTTPS (tighten to your CIDRs).
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- if .Values.networkPolicy.awsPodIdentity }}
---
# On Cilium clusters using EKS Pod Identity, the credential endpoint runs on the
# node host network (link-local 169.254.170.23:80). Cilium classifies it as the
# "host" entity, which a Kubernetes NetworkPolicy ipBlock cannot match — so the AWS
# SDK's credential fetch is silently dropped and the cloud provider hangs. This
# CiliumNetworkPolicy is the supported way to allow it. Enable when cloud.provider
# is aws AND the cluster runs Cilium.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "runlore.fullname" . }}-aws-pod-identity
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "runlore.selectorLabels" . | nindent 6 }}
  egress:
    - toEntities: [host]
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
{{- end }}
{{- end }}
