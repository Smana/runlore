{{- if and (ne .Values.workloadKind "StatefulSet") .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
{{- /* StatefulSet mode owns its per-replica PVCs via volumeClaimTemplates (statefulset.yaml) instead. */}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "runlore.fullname" . }}-data
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
