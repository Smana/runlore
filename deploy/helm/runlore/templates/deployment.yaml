apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "runlore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "runlore.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "runlore.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: runlore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/runlore/runlore.yaml
            - --addr
            - ":{{ .Values.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            # /readyz is gated by leadership — only the leader serves webhook traffic.
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/runlore
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.catalog.configMap }}
            - name: catalog
              mountPath: {{ .Values.catalog.mountPath }}
              readOnly: true
            {{- else if .Values.catalog.gitSync }}
            - name: catalog
              mountPath: {{ .Values.catalog.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "runlore.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.catalog.configMap }}
        - name: catalog
          configMap:
            name: {{ .Values.catalog.configMap }}
        {{- else if .Values.catalog.gitSync }}
        - name: catalog
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
