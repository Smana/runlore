{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  # React + what-changed: watch Flux Kustomizations, read GitRepositories.
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "watch"]
  # Deep read-only introspection (gitops_resource_status / gitops_tree): HelmReleases,
  # the other Flux source kinds, and Events.
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["ocirepositories", "helmrepositories", "helmcharts", "buckets", "externalartifacts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # pod_status / kube_events triage the INCIDENT's namespace (an arbitrary workload
  # namespace, e.g. apps/payments), so pod STATUS reads must be cluster-wide. This grants
  # pod metadata/status only — NOT pods/log (raw log bodies), which is scoped to a
  # namespaced Role over rbac.controllerLogNamespaces below so secret-bearing logs are
  # not readable cluster-wide and fed to an external LLM. (Redaction of secrets that
  # still surface via status/event messages is a separate follow-up — roadmap R19.)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Argo CD engine (config.gitops.engine: argocd)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # NOTE: execution rights (patch) are intentionally NOT granted cluster-wide here.
  # They are scoped to rbac.actionNamespaces as namespaced Roles below, so a
  # confused/compromised agent cannot mutate flux-system or another team's workloads.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "runlore.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced lease access for leader election (HA).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- range .Values.rbac.controllerLogNamespaces }}
---
# controller_logs: read RAW Flux controller pod logs in THIS namespace only (default
# flux-system) — never cluster-wide — because pod logs may carry secrets/PII and tool
# output is sent to an external LLM. pods get/list is repeated here (in addition to the
# cluster-wide grant) so the Role is self-contained: controller_logs lists the matching
# controller pods before streaming pods/log.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" $ }}-controller-logs
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" $ }}-controller-logs
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" $ }}-controller-logs
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- if .Values.rbac.allowActions }}
{{- range .Values.rbac.actionNamespaces }}
---
# Namespace-scoped execution rights (config.actions): patch Flux resources in THIS
# namespace only — never cluster-wide — so the blast radius is bounded. The set
# should mirror config.actions.allow.namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" $ }}-actions
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "patch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" $ }}-actions
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" $ }}-actions
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
