{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  # React + what-changed: watch Flux Kustomizations, read GitRepositories.
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "watch"]
  # Deep read-only introspection (flux_resource_status / flux_tree): HelmReleases,
  # the other Flux source kinds, and Events.
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["ocirepositories", "helmrepositories", "helmcharts", "buckets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # controller_logs: read Flux controller pod logs (read-only).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Argo CD engine (config.gitops.engine: argocd)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # NOTE: execution rights (patch) are intentionally NOT granted cluster-wide here.
  # They are scoped to rbac.actionNamespaces as namespaced Roles below, so a
  # confused/compromised agent cannot mutate flux-system or another team's workloads.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "runlore.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced lease access for leader election (HA).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.rbac.allowActions }}
{{- range .Values.rbac.actionNamespaces }}
---
# Namespace-scoped execution rights (config.actions): patch Flux resources in THIS
# namespace only — never cluster-wide — so the blast radius is bounded. The set
# should mirror config.actions.allow.namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" $ }}-actions
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "patch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" $ }}-actions
  namespace: {{ . }}
  labels:
    {{- include "runlore.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" $ }}-actions
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
