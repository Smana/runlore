{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  # React + what-changed: watch Flux Kustomizations, read GitRepositories.
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "runlore.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced lease access for leader election (HA).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runlore.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runlore.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runlore.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "runlore.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
