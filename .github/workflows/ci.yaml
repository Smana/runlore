name: ci
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only needs to read the repo. Override per-job if a
# step needs more (e.g. SARIF upload needs security-events: write).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: SPDX headers
        run: |
          missing=""
          for f in $(git ls-files '*.go'); do
            head -1 "$f" | grep -q '^// SPDX-License-Identifier: Apache-2.0$' || missing="$missing $f"
          done
          if [ -n "$missing" ]; then
            echo "Missing SPDX-License-Identifier header (must be the first line):"
            for f in $missing; do echo "  $f"; done
            exit 1
          fi
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: test (with race detector)
        run: go test -race ./...
      - name: govulncheck
        # Checks the module graph against the Go vulnerability DB; fails on a
        # known-vulnerable, reachable call path. Run via `go run` to avoid a
        # go.mod dependency (pinned by the module cache + checksum DB).
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
