name: ci
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only needs to read the repo. Override per-job if a
# step needs more (e.g. SARIF upload needs security-events: write).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: govulncheck
        # Checks the module graph against the Go vulnerability DB; fails on a
        # known-vulnerable, reachable call path. Run via `go run` to avoid a
        # go.mod dependency (pinned by the module cache + checksum DB).
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2
