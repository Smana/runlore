# Nightly replay-eval: runs the lore eval harness against example cases and
# gates on a 70% pass-rate.
#
# IMPORTANT: this job requires the RUNLORE_EVAL_API_KEY repo secret (an
# Anthropic API key). When the secret is absent the run is skipped gracefully
# (job exits 0) so the nightly schedule does not produce spurious failures —
# but the skip is LOUD: a `::warning::` annotation (surfaced in the Actions
# run summary / checks UI) plus a $GITHUB_STEP_SUMMARY line, so a run with no
# key configured can never be mistaken for a real green eval.
name: eval
on:
  schedule:
    - cron: "0 6 * * *"        # nightly 06:00 UTC
  workflow_dispatch: {}         # manual run from the Actions tab

# Least privilege: the workflow only reads the repo; the replay-eval job elevates
# to contents:write solely to push the public scorecard to the eval-scorecard
# branch (never to main).
permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # push the scorecard to the eval-scorecard branch only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # Guard: check whether the API key secret is set without echoing it.
      # We map the secret to an env var and test -n so the value is never
      # printed. The output `has_key` drives all subsequent steps.
      - id: guard
        env:
          KEY: ${{ secrets.RUNLORE_EVAL_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      # Emit a loud warning annotation AND a job-summary line when the key is
      # absent so the skip is self-documenting in the Actions UI — a missing
      # secret must never look like a quiet, real green run.
      - name: skip notice (no API key)
        if: steps.guard.outputs.has_key != 'true'
        run: |
          echo "::warning title=Eval skipped::RUNLORE_EVAL_API_KEY is not set — the nightly eval did NOT run"
          echo "## eval skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "The \`RUNLORE_EVAL_API_KEY\` repo secret (Anthropic API key) is not configured, so this run did **not** exercise the eval harness. Set the secret to enable nightly eval runs." >> "$GITHUB_STEP_SUMMARY"

      - name: build lore binary
        if: steps.guard.outputs.has_key == 'true'
        run: go build -o lore ./cmd/lore

      - name: replay eval (k-of-n + fail-under gate)
        if: steps.guard.outputs.has_key == 'true'
        env:
          RUNLORE_EVAL_API_KEY: ${{ secrets.RUNLORE_EVAL_API_KEY }}
        run: ./lore eval -config eval/ci.runlore.yaml -cases examples/eval -n 5 -fail-under 0.7 -report-dir eval/reports

      - name: upload report
        # always() so a genuine eval failure (key present, score < gate) still
        # uploads its diagnostic report; gated on has_key so a skipped run doesn't.
        if: always() && steps.guard.outputs.has_key == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-report
          path: eval/reports/
          if-no-files-found: warn

      - name: publish scorecard (eval-scorecard branch)
        # always(): a gate failure (score < 70%) must publish exactly like a pass —
        # the scorecard's value is honesty. Guarded to main so a workflow_dispatch
        # from a feature branch can't overwrite the published numbers, and to
        # has_key so a skipped run publishes nothing.
        if: always() && steps.guard.outputs.has_key == 'true' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          REPORT=$(ls -t eval/reports/*-replay.json 2>/dev/null | head -1 || true)
          if [ -z "$REPORT" ]; then
            echo "::warning title=Scorecard skipped::no replay report found (eval crashed before writing one)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          OUT="$RUNNER_TEMP/scorecard-branch"
          if git fetch origin eval-scorecard; then
            git worktree add -B eval-scorecard "$OUT" origin/eval-scorecard
          else
            git worktree add --detach "$OUT"
            git -C "$OUT" checkout --orphan eval-scorecard
            git -C "$OUT" rm -rf --quiet . || true
          fi
          ./lore eval scorecard -report "$REPORT" -dir "$OUT"
          git -C "$OUT" add -A
          git -C "$OUT" commit -m "chore(eval): nightly scorecard $(date -u +%Y-%m-%d)" || { echo "no changes to publish"; exit 0; }
          git -C "$OUT" push origin eval-scorecard
